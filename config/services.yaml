services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # Editability
    Kachnitel\DynamicFormBundle\Editability\:
        resource: '../src/Editability'

    # Permissive default — override this alias in your own services.yaml to
    # enforce your own field-editability policy. kachnitel/admin-bundle
    # overrides it with AdminColumnEditabilityResolver.
    Kachnitel\DynamicFormBundle\Editability\FieldEditabilityResolverInterface:
        alias: Kachnitel\DynamicFormBundle\Editability\AlwaysEditableFieldResolver

    # Form
    # Two files are excluded from this resource's autowiring:
    #
    #  - DynamicFormEditabilityListener is manually instantiated by
    #    DynamicEntityFormType::buildForm() as a form event listener, not a
    #    DI-managed service (mirrors kachnitel/admin-bundle's own
    #    services.yaml, which excludes it from its Form/ resource for the
    #    identical reason).
    #
    #  - TypeGuessing/TypeGuessingCoordinator.php is manually instantiated
    #    inside DoctrineFormTypeMapper's own constructor, reusing the exact
    #    $typeGuesser/$minimumGuessConfidence values DoctrineFormTypeMapper
    #    itself receives (see that constructor, and the $typeGuesser
    #    override below). If left in this resource, the container would
    #    ALSO try to autowire TypeGuessingCoordinator as its own standalone
    #    service — independently resolving its own ?FormTypeGuesserInterface
    #    argument. That fails to compile: this bundle's own
    #    ConventionalFieldTypeGuesser and Symfony's form.type_guesser.validator
    #    both implement FormTypeGuesserInterface, so autowiring by interface
    #    is ambiguous between the two — exactly the ambiguity the explicit
    #    $typeGuesser override below exists to resolve for
    #    DoctrineFormTypeMapper. With no consumer for a second,
    #    independently-resolved instance, excluding it here is simpler than
    #    duplicating that override for a service nothing uses directly.
    Kachnitel\DynamicFormBundle\Form\:
        resource: '../src/Form'
        exclude:
            - '../src/Form/DynamicFormEditabilityListener.php'
            - '../src/Form/TypeGuessing/TypeGuessingCoordinator.php'

    # Constraint-driven type guessing (see docs/TYPE_GUESSING.md). Wires
    # Symfony's own form.type_guesser.validator so a #[Assert\Email],
    # #[Assert\Url], #[Assert\Country], etc. on a Doctrine `string` column
    # upgrades that field's widget beyond the generic TextType, with zero
    # configuration required.
    #
    # @? is deliberate: an optional reference. If a consuming app somehow has
    # symfony/validator installed but framework.validation disabled, the
    # container still compiles and DoctrineFormTypeMapper receives null —
    # today's guessing-off behaviour — rather than a hard compile failure.
    #
    # This does NOT include naming-convention guessing (password/tel/color/
    # search) — Kachnitel\DynamicFormBundle\Form\TypeGuessing\
    # ConventionalFieldTypeGuesser ships in this bundle but is intentionally
    # not wired in here. See docs/TYPE_GUESSING.md "Enabling naming-
    # convention guessing" for the opt-in recipe, and its "Real-World
    # Example: kachnitel/admin-bundle" section for how a sibling bundle
    # enables it for its own users by default.
    Kachnitel\DynamicFormBundle\Form\DoctrineFormTypeMapper:
        arguments:
            $typeGuesser: '@?form.type_guesser.validator'
